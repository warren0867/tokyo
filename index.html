<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#3d2b1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>AMEKAJI — 도쿄 여행</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:#f5f0e8;font-family:'Courier New',Courier,monospace;min-height:100vh;-webkit-text-size-adjust:100%;}
input,textarea,button{font-family:'Courier New',Courier,monospace;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
button{cursor:pointer;border:none;background:none;}
textarea{resize:vertical;}

.global-nav{display:flex;background:#1a0f08;position:sticky;top:0;z-index:100;border-bottom:2px solid #c8a96e;}
.global-nav button{flex:1;padding:13px 0;color:#9a7a5a;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border-bottom:3px solid transparent;transition:all .2s;}
.global-nav button.active{color:#c8a96e;border-bottom:3px solid #c8a96e;}
.page{display:none;padding:16px 12px 80px;}
.page.active{display:block;}
.inner{max-width:680px;margin:0 auto;}

.hdr{text-align:center;border-top:3px solid #3d2b1a;border-bottom:3px solid #3d2b1a;padding:14px 0 10px;margin-bottom:12px;}
.hdr-sub{font-size:9px;letter-spacing:7px;color:#7a5c3a;text-transform:uppercase;margin-bottom:3px;}
.hdr-main{font-size:24px;font-weight:900;letter-spacing:6px;color:#3d2b1a;text-transform:uppercase;}
.hdr-desc{font-size:9px;letter-spacing:3px;color:#7a5c3a;margin-top:4px;text-transform:uppercase;}
.hdr-count{font-size:10px;color:#c8622a;letter-spacing:2px;margin-top:4px;}

.topbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.save-box{flex:1;min-width:150px;display:flex;align-items:center;justify-content:space-between;background:#faf7f0;border:1px solid #d4c5a9;padding:7px 12px;gap:6px;flex-wrap:wrap;}
.save-time{font-size:9px;color:#9a7a5a;}
.save-badge{font-size:9px;font-weight:700;padding:2px 8px;letter-spacing:1px;border:1.5px solid;}
.rate-box{display:flex;align-items:center;gap:6px;background:#3d2b1a;color:#f5f0e8;padding:7px 12px;}
.rate-box span{font-size:10px;opacity:.7;white-space:nowrap;}
.rate-box input{width:52px;background:transparent;border:none;border-bottom:1px solid rgba(200,169,110,.5);color:#c8a96e;font-size:15px;font-weight:900;text-align:center;outline:none;padding:1px 0;}

.stats{background:#3d2b1a;color:#f5f0e8;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.stats-num{min-width:48px;}
.stats-num .label{font-size:8px;letter-spacing:2px;opacity:.5;margin-bottom:1px;text-transform:uppercase;}
.stats-num .val{font-size:17px;font-weight:900;color:#c8a96e;}
.stats-num .val small{font-size:10px;opacity:.4;}
.stats-bar-wrap{flex:1;}
.stats-bar{display:flex;height:5px;gap:2px;margin-bottom:4px;}
.stats-bar div{transition:flex .4s ease;min-width:3px;}
.stats-legend{display:flex;gap:8px;font-size:8px;opacity:.65;flex-wrap:wrap;}
.stats-pct{font-size:18px;font-weight:900;color:#c8a96e;min-width:38px;text-align:right;}

.view-tabs{display:flex;gap:4px;margin-bottom:10px;}
.view-tabs button{border:1.5px solid #3d2b1a;background:transparent;color:#3d2b1a;font-size:11px;font-weight:700;padding:6px 14px;transition:all .15s;}
.view-tabs button.active{background:#3d2b1a;color:#f5f0e8;}

.search-box{display:flex;align-items:center;gap:8px;background:#faf7f0;border:1px solid #d4c5a9;padding:8px 12px;margin-bottom:10px;}
.search-box input{flex:1;border:none;background:transparent;color:#3d2b1a;font-size:12px;outline:none;}
.filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.filter-bar button{border:1.5px solid #3d2b1a;background:transparent;color:#3d2b1a;font-size:10px;font-weight:700;padding:4px 9px;transition:all .15s;}
.filter-bar button.active{background:#3d2b1a;color:#f5f0e8;}

.cat-hdr{width:100%;display:flex;align-items:center;justify-content:space-between;background:#3d2b1a;padding:10px 15px;color:#f5f0e8;text-align:left;}
.cat-hdr .left{display:flex;align-items:center;gap:8px;}
.cat-hdr .name{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.cat-hdr .right{display:flex;align-items:center;gap:8px;}
.cat-badge{font-size:9px;padding:2px 6px;}
.cat-body{border:1px solid #3d2b1a;border-top:none;background:#fdfaf4;}

.item-card{padding:11px 13px 10px;transition:background .2s;}
.item-card+.item-card{border-top:1px dashed #d4c5a9;}
.item-inner{display:flex;align-items:flex-start;gap:10px;}

.item-img{width:68px;height:68px;flex-shrink:0;border:1px solid #d4c5a9;background:#f0ebe0;overflow:hidden;position:relative;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.item-img img{width:100%;height:100%;object-fit:cover;display:block;}
.img-placeholder{text-align:center;font-size:9px;color:#b89f7a;line-height:1.4;padding:4px;}
.img-placeholder span{display:block;font-size:18px;margin-bottom:2px;}
.item-img input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-remove{position:absolute;top:2px;right:2px;background:rgba(61,43,26,.75);color:#f5f0e8;font-size:10px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;z-index:2;}

.item-info{flex:1;min-width:0;}
.item-name-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.iname{font-size:12px;font-weight:700;color:#3d2b1a;}
.iname.skip{text-decoration:line-through;opacity:.6;color:#a06050;}
.pribadge{font-size:9px;font-weight:800;padding:1px 5px;border:1px solid;}
.imodel{font-size:10px;color:#9a7a5a;margin-bottom:6px;}

.brow{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.brow .yen{font-size:9px;color:#9a7a5a;}
.brow input{width:70px;border:none;border-bottom:1px solid #c5b49a;background:transparent;color:#3d2b1a;font-size:11px;outline:none;padding:1px 2px;}
.bkrw{font-size:10px;color:#6b8fb5;font-weight:700;}

.brow2{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.bdiv{width:1px;background:#d4c5a9;margin:0 1px;align-self:stretch;}
.tbtn{font-size:10px;padding:3px 7px;border:1.5px solid #d4c5a9;color:#b89f7a;white-space:nowrap;transition:all .15s;}
.tbtn.on{font-weight:800;}

.iline{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.iline .ico{font-size:10px;flex-shrink:0;}
.iline input{flex:1;border:none;border-bottom:1px solid #d4c5a9;background:transparent;color:#3d2b1a;font-size:11px;outline:none;padding:2px;}

.mbtn{font-size:10px;padding:3px 8px;border:1.5px solid #d4c5a9;color:#b89f7a;margin-top:4px;}
.mbtn.has{border-color:#8a6a4a;color:#7a5c3a;font-weight:700;background:rgba(122,92,58,.08);}
.mta{margin-top:6px;width:100%;border:1px solid #c5b49a;background:#faf7f0;color:#3d2b1a;font-size:11px;padding:7px 9px;outline:none;line-height:1.6;}
.mprev{margin-top:5px;font-size:11px;color:#6a4c2e;background:rgba(122,92,58,.06);border-left:2px solid #c8a96e;padding:4px 8px;line-height:1.5;white-space:pre-wrap;word-break:break-all;cursor:pointer;}

.bcards{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.bcard{flex:1;min-width:100px;background:#fdfaf4;padding:10px 12px;}
.bcard .bl{font-size:8px;color:#9a7a5a;margin-bottom:4px;}
.bcard .by{font-size:16px;font-weight:900;}
.bcard .bk{font-size:10px;color:#9a7a5a;}

.ghdr{width:100%;display:flex;align-items:center;justify-content:space-between;background:#1e3a2e;padding:11px 15px;color:#f5f0e8;text-align:left;}
.ghdr .left{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.gbody{border:1px solid #1e3a2e;border-top:none;background:#fdfaf4;}
.garea{border-bottom:1px solid #e0d4bc;}
.garea:last-child{border-bottom:none;}
.ganame{padding:8px 13px;font-size:11px;font-weight:900;color:#3d2b1a;border-left:3px solid;}
.gshop{padding:7px 13px 7px 20px;display:flex;gap:8px;border-bottom:1px dashed #e8dcc8;}
.gshop:last-child{border-bottom:none;}
.gsname{font-size:11px;font-weight:700;color:#3d2b1a;margin-bottom:1px;}
.gsnote{font-size:10px;color:#9a7a5a;}
.footer{text-align:center;margin-top:20px;padding:12px 0;border-top:1px solid #b89f7a;font-size:9px;letter-spacing:4px;color:#b89f7a;text-transform:uppercase;}

.jphdr{text-align:center;border-top:3px solid #1e3a2e;border-bottom:3px solid #1e3a2e;padding:14px 0 10px;margin-bottom:14px;}
.jphdr .title{font-size:22px;font-weight:900;letter-spacing:4px;color:#1e3a2e;text-transform:uppercase;}
.jphdr .sub{font-size:9px;letter-spacing:5px;color:#4a7c59;text-transform:uppercase;margin-bottom:4px;}
.jphdr .desc{font-size:10px;color:#4a7c59;margin-top:4px;}
.jptabs{display:flex;gap:4px;margin-bottom:14px;}
.jptabs button{flex:1;border:1.5px solid #1e3a2e;background:transparent;color:#1e3a2e;font-size:11px;font-weight:700;padding:8px;transition:all .15s;}
.jptabs button.active{background:#1e3a2e;color:#f5f0e8;}
.jpstitle{display:flex;align-items:center;gap:8px;padding:9px 13px;background:#1e3a2e;color:#f5f0e8;font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.jpcards{border:1px solid #1e3a2e;border-top:none;margin-bottom:14px;}
.jpcard{padding:14px;border-bottom:1px dashed #c8dbc4;}
.jpcard:last-child{border-bottom:none;}
.jpjp{font-size:22px;font-weight:900;color:#1e3a2e;margin-bottom:5px;letter-spacing:1px;}
.jpread{font-size:12px;color:#c8622a;font-weight:700;margin-bottom:4px;}
.jpmean{font-size:12px;color:#3d2b1a;margin-bottom:4px;}
.jptip{font-size:10px;color:#7a9a5a;font-style:italic;margin-bottom:10px;}
.jpbtns{display:flex;gap:6px;flex-wrap:wrap;}
.jpbtn{display:inline-flex;align-items:center;gap:4px;font-size:11px;font-weight:700;padding:6px 12px;border:1.5px solid;border-radius:2px;text-decoration:none;transition:opacity .15s;}
.jpbtn:active{opacity:.6;}
.jbpapago{color:#03c75a;border-color:#03c75a;background:rgba(3,199,90,.08);}
.jbnaver{color:#3d7a4a;border-color:#3d7a4a;background:rgba(61,122,74,.08);}
.jbcopy{color:#8f6bb5;border-color:#8f6bb5;background:rgba(143,107,181,.08);}
.jbjisho{color:#4a6bb5;border-color:#4a6bb5;background:rgba(74,107,181,.08);}
/* 검색창 */
.jp-searchbox{display:flex;align-items:center;gap:10px;background:#faf7f0;border:2px solid #1e3a2e;padding:10px 14px;margin-bottom:12px;}
.jp-searchbox input{flex:1;border:none;background:transparent;color:#1e3a2e;font-size:14px;outline:none;font-weight:700;}
.jp-searchbox input::placeholder{color:#aaa;font-weight:400;font-size:12px;}
#jp-external{background:#faf7f0;border:1px solid #c8dbc4;padding:12px 14px;margin-bottom:12px;}
</style>
</head>
<body>

<nav class="global-nav">
  <button class="active" onclick="switchPage('checklist')">🛍 체크리스트</button>
  <button onclick="switchPage('japanese')">🗾 일본어 회화</button>
</nav>

<!-- ══ 체크리스트 ══ -->
<div id="page-checklist" class="page active">
<div class="inner">
  <div class="hdr">
    <div class="hdr-sub">American Casual — Tokyo Shopping</div>
    <div class="hdr-main">AMEKAJI</div>
    <div class="hdr-desc">Essential Wardrobe Checklist</div>
    <div class="hdr-count" id="hdr-count">🗾 도쿄 쇼핑 에디션 · 총 46개 아이템</div>
  </div>
  <div class="topbar">
    <div class="save-box">
      <div class="save-time" id="save-time">저장 기록 없음</div>
      <div class="save-badge" id="save-badge" style="color:#9a7a5a;border-color:#c5b49a;">자동저장 ON</div>
    </div>
    <div class="rate-box">
      <span>¥100 =</span>
      <input type="number" id="rate-input" value="920" onchange="onRateChange(this.value)"/>
      <span>원</span>
    </div>
  </div>
  <div class="stats">
    <div class="stats-num">
      <div class="label">보유/완료</div>
      <div class="val" id="stats-done">0<small>/46</small></div>
    </div>
    <div class="stats-bar-wrap">
      <div class="stats-bar" id="stats-bar"></div>
      <div class="stats-legend" id="stats-legend"></div>
    </div>
    <div class="stats-pct" id="stats-pct">0%</div>
  </div>
  <div class="view-tabs">
    <button class="active" id="btn-list" onclick="switchView('list')">📋 리스트</button>
    <button id="btn-summary" onclick="switchView('summary')">🛍 쇼핑 요약</button>
  </div>
  <div id="list-view">
    <div class="search-box">
      <span style="font-size:12px;color:#9a7a5a">🔍</span>
      <input type="text" id="search-input" placeholder="검색 (데님, 플라넬, Carhartt...)" oninput="onSearch(this.value)"/>
      <button style="color:#b89f7a;font-size:14px" onclick="clearSearch()">✕</button>
    </div>
    <div class="filter-bar" id="filter-bar"></div>
    <div id="cat-list"></div>
    <div style="margin-top:16px;margin-bottom:10px;">
      <button class="ghdr" onclick="toggleGuide()">
        <div class="left"><span>🗾</span>도쿄 쇼핑 가이드</div>
        <span id="garrow" style="font-size:10px;opacity:.5">▼</span>
      </button>
      <div id="gbody" class="gbody" style="display:none"></div>
    </div>
  </div>
  <div id="summary-view" style="display:none">
    <div class="bcards" id="budget-cards"></div>
    <div id="summary-list"></div>
  </div>
  <div class="footer" id="footer-text">◆ AMEKAJI WARDROBE ◆</div>
</div>
</div>

<!-- ══ 일본어 ══ -->
<div id="page-japanese" class="page">
<div class="inner">
  <div class="jphdr">
    <div class="sub">Tokyo Travel — Language Guide</div>
    <div class="title">日本語 회화</div>
    <div class="desc">검색 → 없는 단어는 파파고·네이버에서 바로 확인</div>
  </div>

  <!-- 검색창 -->
  <div class="jp-searchbox">
    <span style="font-size:14px">🔍</span>
    <input type="text" id="jp-input" placeholder="한국어 또는 일본어로 검색 (예: 얼마, 사이즈, ありがとう)"
      oninput="jpSearch(this.value)" autocomplete="off" autocorrect="off"/>
    <button onclick="jpClear()" style="color:#b89f7a;font-size:16px;padding:0 4px">✕</button>
  </div>

  <!-- AI 번역 결과 -->
  <div id="jp-ai-result"></div>

  <!-- 탭 (검색 없을 때) -->
  <div class="jptabs" id="jp-tab-wrap">
    <button class="active" id="jp-tab-common" onclick="switchJPTab('common')">💬 자주 쓰는 일본어</button>
    <button id="jp-tab-shopping" onclick="switchJPTab('shopping')">🛍 쇼핑 관련</button>
  </div>

  <div id="jp-results"></div>
  <div id="jp-common"></div>
  <div id="jp-shopping" style="display:none"></div>
</div>
</div>

// ════════════ IndexedDB (이미지 전용) ════════════
let DB=null;
function openDB(){
  return new Promise((res,rej)=>{
    const r=indexedDB.open('amekaji_v1',1);
    r.onupgradeneeded=e=>e.target.result.createObjectStore('imgs',{keyPath:'id'});
    r.onsuccess=e=>{DB=e.target.result;res();};
    r.onerror=()=>rej();
  });
}
function dbSaveImg(id,data){
  if(!DB)return;
  DB.transaction('imgs','readwrite').objectStore('imgs').put({id,data});
}
function dbDelImg(id){
  if(!DB)return;
  DB.transaction('imgs','readwrite').objectStore('imgs').delete(id);
}
function dbLoadImgs(){
  return new Promise(res=>{
    if(!DB){res({});return;}
    const r=DB.transaction('imgs','readonly').objectStore('imgs').getAll();
    r.onsuccess=e=>{const m={};e.target.result.forEach(x=>m[x.id]=x.data);res(m);};
    r.onerror=()=>res({});
  });
}

// ════════════ 이미지 ════════════
function handleImg(id,file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const c=document.createElement('canvas');
      const mx=250;let w=img.width,h=img.height;
      if(w>mx||h>mx){const rt=Math.min(mx/w,mx/h);w*=rt;h*=rt;}
      c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      const d=c.toDataURL('image/jpeg',.82);
      S.imgs[id]=d;dbSaveImg(id,d);
      refreshImg(id);
    };
    img.src=e.target.result;
  };
  r.readAsDataURL(file);
}
function removeImg(id){
  delete S.imgs[id];dbDelImg(id);refreshImg(id);
}
function refreshImg(id){
  const b=document.getElementById('ib-'+id);
  if(b)b.innerHTML=imgHTML(id);
}
function imgHTML(id){
  const d=S.imgs[id];
  if(d)return `<img src="${d}" alt=""/><button class="img-remove" onclick="event.stopPropagation();removeImg('${id}')">✕</button><input type="file" accept="image/*" onchange="handleImg('${id}',this.files[0])" onclick="event.stopPropagation()"/>`;
  return `<div class="img-placeholder"><span>📷</span>사진 추가</div><input type="file" accept="image/*" onchange="handleImg('${id}',this.files[0])" onclick="event.stopPropagation()"/>`;
}

function updateStats(){
  const c={own:0,want:0,bought:0,skip:0};
  ALL.forEach(i=>{if(S.st[i.id])c[S.st[i.id]]++;});
  const none=ALL.length-c.own-c.want-c.bought-c.skip;
  const done=c.own+c.bought;
  const pct=Math.round(done/ALL.length*100);
  document.getElementById('stats-done').innerHTML=done+'<small>/'+ALL.length+'</small>';
  document.getElementById('stats-pct').textContent=pct+'%';
  const segs=[{v:c.own,c:'#4a7c59'},{v:c.bought,c:'#c8622a'},{v:c.want,c:'#6b8fb5'},{v:c.skip,c:'#b05a4a'},{v:none,c:'rgba(255,255,255,.12)'}];
  document.getElementById('stats-bar').innerHTML=segs.filter(s=>s.v>0).map(s=>`<div style="flex:${s.v};background:${s.c}"></div>`).join('');
  document.getElementById('stats-legend').innerHTML=
    `<span style="color:#6db88a">■ 보유 ${c.own}</span>
     <span style="color:#e07a4a">■ 완료 ${c.bought}</span>
     <span style="color:#8fb5d4">■ 살예정 ${c.want}</span>
     <span style="color:#d4826e">■ 패스 ${c.skip}</span>
     <span>□ 미정 ${none}</span>`;
  document.getElementById('footer-text').textContent=
    pct>=100?'◆ WARDROBE COMPLETE ◆':`◆ 살예정 ${c.want}개 · 구매완료 ${c.bought}개 · 미정 ${none}개 ◆`;
}

// ════════════ 아이템 카드 ════════════
function card(item){
  const st=S.st[item.id],pri=S.pri[item.id];
  const sc=st?SC[st]:null,pc=pri?PC[pri]:null;
  const bv=S.bgt[item.id]||'';
  const hasMemo=!!(S.mem[item.id]&&S.mem[item.id].trim());
  const mo=S.mo[item.id];

  const sBtns=Object.entries(SC).map(([k,v])=>{
    const on=st===k;
    return `<button class="tbtn${on?' on':''}" style="${on?`color:${v.color};border-color:${v.color};background:${v.bg};font-weight:800`:'color:#b89f7a;border-color:#d4c5a9'}" onclick="toggleSt('${item.id}','${k}')">${v.label}</button>`;
  }).join('');
  const pBtns=Object.entries(PC).map(([k,v])=>{
    const on=pri===k;
    return `<button class="tbtn${on?' on':''}" style="${on?`color:${v.color};background:${v.bg};border-color:${v.color};font-weight:800`:'color:#b89f7a;border-color:#d4c5a9'}" onclick="togglePri('${item.id}','${k}')">${v.label}</button>`;
  }).join('');

  const memoSec=mo
    ?`<textarea class="mta" rows="2" placeholder="추가 메모..." onchange="S.mem['${item.id}']=this.value;save()">${S.mem[item.id]||''}</textarea>`
    :(hasMemo?`<div class="mprev" onclick="toggleMemo('${item.id}')">${S.mem[item.id]}</div>`:'');

  return `
<div class="item-card" id="card-${item.id}" style="background:${sc?sc.bg:'transparent'}">
  <div class="item-inner">
    <div class="item-img" id="ib-${item.id}">${imgHTML(item.id)}</div>
    <div class="item-info">
      <div class="item-name-row">
        ${sc?`<div class="sdot" style="background:${sc.dot}"></div>`:''}
        <span class="iname${st==='skip'?' skip':''}">${item.name} <small style="color:#9a7a5a;font-size:10px">(${item.en})</small></span>
        ${pc?`<span class="pribadge" style="color:${pc.color};background:${pc.bg};border-color:${pc.color}">${pc.label}</span>`:''}
      </div>
      <div class="imodel">▸ ${item.model}</div>
      <div class="brow">
        <span class="yen">¥</span>
        <input type="number" placeholder="예산" value="${bv}"
          onchange="S.bgt['${item.id}']=this.value?Number(this.value):null;save();document.getElementById('kw-${item.id}').textContent=this.value?'≈ '+krw(Number(this.value)):''"/>
        <span class="bkrw" id="kw-${item.id}">${bv?'≈ '+krw(bv):''}</span>
      </div>
      <div class="brow2">
        ${sBtns}
        <div class="bdiv"></div>
        ${pBtns}
      </div>
      <div class="iline"><span class="ico">📐</span><input type="text" placeholder="사이즈 (M, W32L32, JP38)" value="${S.sz[item.id]||''}" onchange="uf(S.sz,'${item.id}',this.value)"/></div>
      <div class="iline"><span class="ico">🎨</span><input type="text" placeholder="색상 (인디고, 카키, 네이비)" value="${S.col[item.id]||''}" onchange="uf(S.col,'${item.id}',this.value)"/></div>
      <div class="iline"><span class="ico">🏪</span><input type="text" placeholder="구매처 / 매장" value="${S.str[item.id]||''}" onchange="uf(S.str,'${item.id}',this.value)"/></div>
      <button class="mbtn${hasMemo?' has':''}" onclick="toggleMemo('${item.id}')">${hasMemo?'✏ 메모 ▾':mo?'메모 ▴':'메모 +'}</button>
      ${memoSec}
    </div>
  </div>
</div>`;
}

function toggleMemo(id){
  S.mo[id]=!S.mo[id];
  const el=document.getElementById('card-'+id);
  if(el)el.outerHTML=card(ALL.find(i=>i.id===id));
}

// ════════════ 카테고리 렌더 ════════════
function renderCats(){
  let html='';
  CATS.forEach(cat=>{
    const vis=cat.items.filter(i=>show(i.id));
    if(!vis.length)return;
    const done=cat.items.filter(i=>S.st[i.id]==='own'||S.st[i.id]==='bought').length;
    const open=S.oc[cat.id];
    const bst=done===cat.items.length?'background:#c8a96e;color:#3d2b1a':'background:rgba(255,255,255,.1);color:#c8a96e';
    html+=`<div style="margin-bottom:10px">
      <button class="cat-hdr" onclick="toggleCat('${cat.id}')">
        <div class="left"><span style="font-size:13px">${cat.icon}</span><span class="name">${cat.label}</span></div>
        <div class="right"><span class="cat-badge" style="${bst}">${done}/${cat.items.length}</span><span style="font-size:10px;opacity:.5">${open?'▲':'▼'}</span></div>
      </button>
      ${open?`<div class="cat-body">${vis.map(card).join('')}</div>`:''}
    </div>`;
  });
  document.getElementById('cat-list').innerHTML=html;
}
function toggleCat(id){S.oc[id]=!S.oc[id];ls('ak_oc',S.oc);renderCats();}

function renderSummary(){
  const wb=ALL.filter(i=>S.st[i.id]==='want').reduce((s,i)=>s+(Number(S.bgt[i.id])||0),0);
  const bb=ALL.filter(i=>S.st[i.id]==='bought').reduce((s,i)=>s+(Number(S.bgt[i.id])||0),0);
  const p1b=ALL.filter(i=>S.pri[i.id]==='1').reduce((s,i)=>s+(Number(S.bgt[i.id])||0),0);
  const cs=[{label:'살예정 예산',val:wb,color:'#6b8fb5'},{label:'★ 1순위 예산',val:p1b,color:'#c8622a'},{label:'구매완료 합계',val:bb,color:'#4a7c59'}].filter(c=>c.val>0);
  document.getElementById('budget-cards').innerHTML=cs.map(c=>`<div class="bcard" style="border:1.5px solid ${c.color}40"><div class="bl">${c.label}</div><div class="by" style="color:${c.color}">${yen(c.val)}</div><div class="bk">≈ ${krw(c.val)}</div></div>`).join('');
  const items=ALL.filter(i=>S.st[i.id]==='want'||S.st[i.id]==='bought'||S.pri[i.id]);
  if(!items.length){document.getElementById('summary-list').innerHTML='<div style="text-align:center;padding:40px;color:#9a7a5a;font-size:12px">♥ 살예정 또는 ★순위 아이템이 없습니다</div>';return;}
  const grouped={};
  items.forEach(i=>{const c=ICAT[i.id];if(!grouped[c.id])grouped[c.id]={...c,items:[]};grouped[c.id].items.push(i);});
  let html='';
  Object.values(grouped).forEach(cat=>{
    html+=`<div style="margin-bottom:12px"><div style="display:flex;align-items:center;gap:8px;padding:7px 13px;background:#3d2b1a;color:#f5f0e8"><span>${cat.icon}</span><span style="font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase">${cat.label}</span></div><div style="border:1px solid #3d2b1a;border-top:none">`;
    cat.items.forEach((item,idx)=>{
      const st=S.st[item.id],pri=S.pri[item.id];
      const sc=st?SC[st]:null,pc=pri?PC[pri]:null,bgt=S.bgt[item.id],img=S.imgs[item.id];
      html+=`<div style="display:flex;gap:10px;padding:10px 13px;background:${sc?sc.bg:'transparent'};${idx>0?'border-top:1px dashed #d4c5a9':''};align-items:flex-start">
        ${img?`<img src="${img}" style="width:56px;height:56px;object-fit:cover;border:1px solid #d4c5a9;flex-shrink:0"/>`:`<div style="width:56px;height:56px;background:#f0ebe0;border:1px solid #d4c5a9;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:20px">📷</div>`}
        <div style="flex:1">
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px">${sc?`<span style="font-size:9px;color:${sc.color};border:1px solid ${sc.color};padding:1px 5px;font-weight:700">${sc.label}</span>`:''} ${pc?`<span style="font-size:9px;color:${pc.color};background:${pc.bg};border:1px solid ${pc.color};padding:1px 5px;font-weight:800">${pc.label}</span>`:''}</div>
          <div style="font-size:12px;font-weight:700;color:#3d2b1a;margin-bottom:2px">${item.name}</div>
          <div style="font-size:10px;color:#9a7a5a">▸ ${item.model}</div>
          ${S.sz[item.id]?`<div style="font-size:10px;color:#7a5c3a">📐 ${S.sz[item.id]}</div>`:''}
          ${S.col[item.id]?`<div style="font-size:10px;color:#7a5c3a">🎨 ${S.col[item.id]}</div>`:''}
          ${S.str[item.id]?`<div style="font-size:10px;color:#7a5c3a">🏪 ${S.str[item.id]}</div>`:''}
          ${S.mem[item.id]?`<div style="font-size:10px;color:#6a4c2e;border-left:2px solid #c8a96e;padding-left:6px;margin-top:4px">${S.mem[item.id]}</div>`:''}
        </div>
        ${bgt?`<div style="text-align:right;flex-shrink:0"><div style="font-size:14px;font-weight:900;color:${st==='bought'?'#c8622a':'#6b8fb5'}">${yen(bgt)}</div><div style="font-size:10px;color:#9a7a5a">${krw(bgt)}</div></div>`:''}

    });
    html+='</div></div>';

function copyTxt(txt,btn){
  if(navigator.clipboard){navigator.clipboard.writeText(txt);}
  else{const e=document.createElement('textarea');e.value=txt;document.body.appendChild(e);e.select();document.execCommand('copy');document.body.removeChild(e);}
  const orig=btn.textContent;btn.textContent='✓ 복사됨';setTimeout(()=>btn.textContent=orig,1500);
}

function jpCard(p){
  const safe=p.jp.replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `<div class="jpcard">
    <div class="jpjp">${p.jp}</div>
    ${p.read?`<div class="jpread">🔊 ${p.read}</div>`:''}
    ${p.meaning?`<div class="jpmean">💬 ${p.meaning}</div>`:''}
    ${p.tip?`<div class="jptip">💡 ${p.tip}</div>`:''}
    <div class="jpbtns">
      <button class="jpbtn jbcopy" onclick="copyTxt('${safe}',this)">📋 복사</button>
    </div>
  </div>`;
}

// ── 히라가나/카타카나 → 한글 발음 ──
const KANA={'ぁ':'아','あ':'아','ぃ':'이','い':'이','ぅ':'우','う':'우','ぇ':'에','え':'에','ぉ':'오','お':'오','か':'카','が':'가','き':'키','ぎ':'기','く':'쿠','ぐ':'구','け':'케','げ':'게','こ':'코','ご':'고','さ':'사','ざ':'자','し':'시','じ':'지','す':'스','ず':'즈','せ':'세','ぜ':'제','そ':'소','ぞ':'조','た':'타','だ':'다','ち':'치','ぢ':'지','っ':'','つ':'츠','づ':'즈','て':'테','で':'데','と':'토','ど':'도','な':'나','に':'니','ぬ':'누','ね':'네','の':'노','は':'하','ば':'바','ぱ':'파','ひ':'히','び':'비','ぴ':'피','ふ':'후','ぶ':'부','ぷ':'푸','へ':'헤','べ':'베','ぺ':'페','ほ':'호','ぼ':'보','ぽ':'포','ま':'마','み':'미','む':'무','め':'메','も':'모','ゃ':'야','や':'야','ゅ':'유','ゆ':'유','ょ':'요','よ':'요','ら':'라','り':'리','る':'루','れ':'레','ろ':'로','わ':'와','ゐ':'이','ゑ':'에','を':'오','ん':'은','ア':'아','イ':'이','ウ':'우','エ':'에','オ':'오','カ':'카','ガ':'가','キ':'키','ギ':'기','ク':'쿠','グ':'구','ケ':'케','ゲ':'게','コ':'코','ゴ':'고','サ':'사','ザ':'자','シ':'시','ジ':'지','ス':'스','ズ':'즈','セ':'세','ゼ':'제','ソ':'소','ゾ':'조','タ':'타','ダ':'다','チ':'치','ッ':'','ツ':'츠','テ':'테','デ':'데','ト':'토','ド':'도','ナ':'나','ニ':'니','ヌ':'누','ネ':'네','ノ':'노','ハ':'하','バ':'바','パ':'파','ヒ':'히','ビ':'비','ピ':'피','フ':'후','ブ':'부','プ':'푸','ヘ':'헤','ベ':'베','ペ':'페','ホ':'호','ボ':'보','ポ':'포','マ':'마','ミ':'미','ム':'무','メ':'메','モ':'모','ヤ':'야','ユ':'유','ヨ':'요','ラ':'라','リ':'리','ル':'루','レ':'레','ロ':'로','ワ':'와','ヲ':'오','ン':'은','ー':'—','。':'。','、':'、'};
function kanaToKr(str){
  let r='';
  for(let i=0;i<str.length;i++) r+=KANA[str[i]]||str[i];
  return r;
}

// ── 검색 ──
let jpDebounce=null;
function jpSearch(q){
  q=q.trim();
  const tabWrap=document.getElementById('jp-tab-wrap');
  const resDiv=document.getElementById('jp-results');
  const aiDiv=document.getElementById('jp-ai-result');
  const commonDiv=document.getElementById('jp-common');
  const shopDiv=document.getElementById('jp-shopping');

  if(!q){
    tabWrap.style.display='flex';
    resDiv.innerHTML='';aiDiv.innerHTML='';
    commonDiv.style.display=S.jpTab==='common'?'block':'none';
    shopDiv.style.display=S.jpTab==='shopping'?'block':'none';
    clearTimeout(jpDebounce);return;
  }
  tabWrap.style.display='none';
  commonDiv.style.display='none';
  shopDiv.style.display='none';

  // 1. 로컬 단어장
  const all=[...JP_COMMON,...JP_SHOP];
  const ql=q.toLowerCase();
  const matched=all.filter(p=>
    p.meaning.toLowerCase().includes(ql)||p.jp.includes(q)||
    p.read.toLowerCase().includes(ql)||(p.tip&&p.tip.toLowerCase().includes(ql))
  );
  if(matched.length){
    resDiv.innerHTML=`<div class="jpstitle">📚 단어장 결과 "${q}" — ${matched.length}개</div><div class="jpcards">${matched.map(jpCard).join('')}</div>`;
    aiDiv.innerHTML='';clearTimeout(jpDebounce);return;
  }

  // 2. 없으면 번역 API
  resDiv.innerHTML='';
  aiDiv.innerHTML=`<div class="jpcard" style="text-align:center;color:#9a7a5a;font-size:13px;padding:20px">🔄 번역 중...</div>`;
  clearTimeout(jpDebounce);
  jpDebounce=setTimeout(()=>translateWord(q,aiDiv),600);
}

async function translateWord(q,div){
  try{
    const url=`https://translate.googleapis.com/translate_a/single?client=gtx&sl=ko&tl=ja&dt=t&q=${encodeURIComponent(q)}`;
    const r=await fetch(url);
    const d=await r.json();
    const jpText=d[0]?.map(x=>x[0]).join('')?.trim()||'';
    if(!jpText||jpText===q){
      div.innerHTML=`<div class="jpcard" style="text-align:center;color:#b05a4a;font-size:12px;padding:16px">번역 결과를 찾지 못했어요</div>`;
      return;
    }
    const reading=kanaToKr(jpText);
    const hasKanji=/[\u4e00-\u9faf]/.test(jpText);
    div.innerHTML=`<div class="jpstitle">🔍 번역 결과 "${q}"</div><div class="jpcards">${jpCard({jp:jpText,read:hasKanji?'':reading,meaning:'',tip:''})}</div>`;
  }catch(e){
    div.innerHTML=`<div class="jpcard" style="text-align:center;color:#b05a4a;font-size:12px;padding:16px">오류가 발생했어요. 다시 시도해주세요.</div>`;
  }
}
