<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="theme-color" content="#3d2b1a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<title>AMEKAJI — 도쿄 여행</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
body{background:#f5f0e8;font-family:'Courier New',Courier,monospace;min-height:100vh;-webkit-text-size-adjust:100%;}
input,textarea,button,select{font-family:'Courier New',Courier,monospace;}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
button{cursor:pointer;border:none;background:none;}
textarea{resize:vertical;}

/* ── GLOBAL NAV ── */
.global-nav{
  display:flex;background:#1a0f08;position:sticky;top:0;z-index:100;
  border-bottom:2px solid #c8a96e;
}
.global-nav button{
  flex:1;padding:13px 0;color:#9a7a5a;font-size:11px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;border-bottom:3px solid transparent;
  transition:all .2s;
}
.global-nav button.active{color:#c8a96e;border-bottom:3px solid #c8a96e;}

.page{display:none;padding:16px 12px 80px;}
.page.active{display:block;}
.inner{max-width:680px;margin:0 auto;}

/* ── HEADER ── */
.hdr{text-align:center;border-top:3px solid #3d2b1a;border-bottom:3px solid #3d2b1a;padding:14px 0 10px;margin-bottom:12px;}
.hdr-sub{font-size:9px;letter-spacing:7px;color:#7a5c3a;text-transform:uppercase;margin-bottom:3px;}
.hdr-main{font-size:24px;font-weight:900;letter-spacing:6px;color:#3d2b1a;text-transform:uppercase;}
.hdr-desc{font-size:9px;letter-spacing:3px;color:#7a5c3a;margin-top:4px;text-transform:uppercase;}
.hdr-count{font-size:10px;color:#c8622a;letter-spacing:2px;margin-top:4px;}

/* ── TOP BAR ── */
.topbar{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.save-box{flex:1;min-width:150px;display:flex;align-items:center;justify-content:space-between;background:#faf7f0;border:1px solid #d4c5a9;padding:7px 12px;gap:6px;flex-wrap:wrap;}
.save-time{font-size:9px;color:#9a7a5a;}
.save-badge{font-size:9px;font-weight:700;padding:2px 8px;letter-spacing:1px;border:1.5px solid;}
.rate-box{display:flex;align-items:center;gap:6px;background:#3d2b1a;color:#f5f0e8;padding:7px 12px;}
.rate-box span{font-size:10px;opacity:.7;white-space:nowrap;}
.rate-box input{width:52px;background:transparent;border:none;border-bottom:1px solid rgba(200,169,110,.5);color:#c8a96e;font-size:15px;font-weight:900;text-align:center;outline:none;padding:1px 0;}

/* ── STATS ── */
.stats{background:#3d2b1a;color:#f5f0e8;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;}
.stats-num{min-width:48px;}
.stats-num .label{font-size:8px;letter-spacing:2px;opacity:.5;margin-bottom:1px;text-transform:uppercase;}
.stats-num .val{font-size:17px;font-weight:900;color:#c8a96e;}
.stats-num .val small{font-size:10px;opacity:.4;}
.stats-bar-wrap{flex:1;}
.stats-bar{display:flex;height:5px;gap:2px;margin-bottom:4px;}
.stats-bar div{transition:flex .4s ease;min-width:3px;}
.stats-legend{display:flex;gap:8px;font-size:8px;opacity:.65;flex-wrap:wrap;}
.stats-pct{font-size:18px;font-weight:900;color:#c8a96e;min-width:38px;text-align:right;}

/* ── VIEW TABS ── */
.view-tabs{display:flex;gap:4px;margin-bottom:10px;}
.view-tabs button{border:1.5px solid #3d2b1a;background:transparent;color:#3d2b1a;font-size:11px;font-weight:700;padding:6px 14px;transition:all .15s;}
.view-tabs button.active{background:#3d2b1a;color:#f5f0e8;}

/* ── SEARCH ── */
.search-box{display:flex;align-items:center;gap:8px;background:#faf7f0;border:1px solid #d4c5a9;padding:8px 12px;margin-bottom:10px;}
.search-box input{flex:1;border:none;background:transparent;color:#3d2b1a;font-size:12px;outline:none;}
.search-clear{color:#b89f7a;font-size:14px;}

/* ── FILTER ── */
.filter-bar{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap;}
.filter-bar button{border:1.5px solid #3d2b1a;background:transparent;color:#3d2b1a;font-size:10px;font-weight:700;padding:4px 9px;transition:all .15s;}
.filter-bar button.active{background:#3d2b1a;color:#f5f0e8;}

/* ── CATEGORY ── */
.cat-header{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  background:#3d2b1a;padding:10px 15px;color:#f5f0e8;text-align:left;
}
.cat-header .left{display:flex;align-items:center;gap:8px;}
.cat-header .icon{font-size:13px;}
.cat-header .name{font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.cat-header .right{display:flex;align-items:center;gap:8px;}
.cat-badge{font-size:9px;padding:2px 6px;}
.cat-arrow{font-size:10px;opacity:.5;}
.cat-body{border:1px solid #3d2b1a;border-top:none;background:#fdfaf4;}

/* ── ITEM CARD ── */
.item-card{padding:11px 13px 10px;transition:background .2s;}
.item-card + .item-card{border-top:1px dashed #d4c5a9;}
.item-inner{display:flex;align-items:flex-start;gap:10px;}

/* ── IMAGE UPLOAD ── */
.item-img{
  width:68px;height:68px;flex-shrink:0;border:1px solid #d4c5a9;
  background:#f0ebe0;overflow:hidden;position:relative;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.item-img img{width:100%;height:100%;object-fit:cover;display:block;}
.item-img .img-placeholder{text-align:center;font-size:9px;color:#b89f7a;line-height:1.4;padding:4px;}
.item-img .img-placeholder span{display:block;font-size:18px;margin-bottom:2px;}
.item-img input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.item-img .img-remove{
  position:absolute;top:2px;right:2px;background:rgba(61,43,26,.7);
  color:#f5f0e8;font-size:10px;width:18px;height:18px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  z-index:2;
}

/* ── ITEM INFO ── */
.item-info{flex:1;min-width:0;}
.item-name-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px;}
.status-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.item-name{font-size:12px;font-weight:700;color:#3d2b1a;}
.item-name.skip{text-decoration:line-through;opacity:.6;color:#a06050;}
.pri-badge{font-size:9px;font-weight:800;padding:1px 5px;border:1px solid;}
.item-model{font-size:10px;color:#9a7a5a;margin-bottom:6px;}

/* ── BUDGET ── */
.budget-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;}
.budget-row .yen{font-size:9px;color:#9a7a5a;}
.budget-row input{width:70px;border:none;border-bottom:1px solid #c5b49a;background:transparent;color:#3d2b1a;font-size:11px;outline:none;padding:1px 2px;}
.budget-krw{font-size:10px;color:#6b8fb5;font-weight:700;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:5px;}
.btn-divider{width:1px;background:#d4c5a9;margin:0 1px;align-self:stretch;}
.tag-btn{font-size:10px;font-weight:400;padding:3px 7px;border:1.5px solid #d4c5a9;color:#b89f7a;white-space:nowrap;transition:all .15s;}
.tag-btn.active{font-weight:800;}

/* ── INPUT LINES ── */
.input-line{display:flex;align-items:center;gap:5px;margin-bottom:3px;}
.input-line .ico{font-size:10px;flex-shrink:0;}
.input-line input{flex:1;border:none;border-bottom:1px solid #d4c5a9;background:transparent;color:#3d2b1a;font-size:11px;outline:none;padding:2px;}

/* ── MEMO ── */
.memo-btn{font-size:10px;padding:3px 8px;border:1.5px solid #d4c5a9;color:#b89f7a;margin-top:4px;}
.memo-btn.has{border-color:#8a6a4a;color:#7a5c3a;font-weight:700;background:rgba(122,92,58,.08);}
.memo-textarea{margin-top:6px;width:100%;border:1px solid #c5b49a;background:#faf7f0;color:#3d2b1a;font-size:11px;padding:7px 9px;outline:none;line-height:1.6;}
.memo-preview{margin-top:5px;font-size:11px;color:#6a4c2e;background:rgba(122,92,58,.06);border-left:2px solid #c8a96e;padding:4px 8px;line-height:1.5;white-space:pre-wrap;word-break:break-all;cursor:pointer;}

/* ── SUMMARY VIEW ── */
.budget-cards{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
.budget-card{flex:1;min-width:100px;background:#fdfaf4;padding:10px 12px;}
.budget-card .bc-label{font-size:8px;color:#9a7a5a;margin-bottom:4px;letter-spacing:.5px;}
.budget-card .bc-yen{font-size:16px;font-weight:900;}
.budget-card .bc-krw{font-size:10px;color:#9a7a5a;}

/* ── GUIDE ── */
.guide-header{width:100%;display:flex;align-items:center;justify-content:space-between;background:#1e3a2e;padding:11px 15px;color:#f5f0e8;text-align:left;}
.guide-header .left{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:900;letter-spacing:2px;text-transform:uppercase;}
.guide-body{border:1px solid #1e3a2e;border-top:none;background:#fdfaf4;}
.guide-area{border-bottom:1px solid #e0d4bc;}
.guide-area:last-child{border-bottom:none;}
.guide-area-name{padding:8px 13px;font-size:11px;font-weight:900;color:#3d2b1a;border-left:3px solid;}
.guide-shop{padding:7px 13px 7px 20px;display:flex;gap:8px;border-bottom:1px dashed #e8dcc8;}
.guide-shop:last-child{border-bottom:none;}
.guide-shop-name{font-size:11px;font-weight:700;color:#3d2b1a;margin-bottom:1px;}
.guide-shop-note{font-size:10px;color:#9a7a5a;}

/* ── FOOTER ── */
.footer{text-align:center;margin-top:20px;padding:12px 0;border-top:1px solid #b89f7a;font-size:9px;letter-spacing:4px;color:#b89f7a;text-transform:uppercase;}

/* ═══════════════════════════════════════
   JAPANESE PAGE
═══════════════════════════════════════ */
.jp-header{text-align:center;border-top:3px solid #1e3a2e;border-bottom:3px solid #1e3a2e;padding:14px 0 10px;margin-bottom:14px;}
.jp-header .title{font-size:22px;font-weight:900;letter-spacing:4px;color:#1e3a2e;text-transform:uppercase;}
.jp-header .sub{font-size:9px;letter-spacing:5px;color:#4a7c59;text-transform:uppercase;margin-bottom:4px;}
.jp-header .desc{font-size:10px;color:#4a7c59;margin-top:4px;}

.jp-tabs{display:flex;gap:4px;margin-bottom:14px;}
.jp-tabs button{flex:1;border:1.5px solid #1e3a2e;background:transparent;color:#1e3a2e;font-size:11px;font-weight:700;padding:8px;transition:all .15s;}
.jp-tabs button.active{background:#1e3a2e;color:#f5f0e8;}

.jp-section-title{
  display:flex;align-items:center;gap:8px;
  padding:9px 13px;background:#1e3a2e;color:#f5f0e8;
  font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;
  margin-bottom:0;
}
.jp-cards{border:1px solid #1e3a2e;border-top:none;margin-bottom:14px;}
.jp-card{padding:13px 14px;border-bottom:1px dashed #c8dbc4;}
.jp-card:last-child{border-bottom:none;}
.jp-japanese{font-size:18px;font-weight:900;color:#1e3a2e;margin-bottom:4px;letter-spacing:1px;}
.jp-reading{font-size:11px;color:#c8622a;font-weight:700;margin-bottom:3px;letter-spacing:.5px;}
.jp-meaning{font-size:12px;color:#3d2b1a;margin-bottom:3px;}
.jp-tip{font-size:10px;color:#7a9a5a;font-style:italic;}

/* search in jp */
.jp-search{display:flex;align-items:center;gap:8px;background:#faf7f0;border:1px solid #d4c5a9;padding:8px 12px;margin-bottom:10px;}
.jp-search input{flex:1;border:none;background:transparent;color:#3d2b1a;font-size:12px;outline:none;}

/* copy button */
.jp-copy{float:right;font-size:9px;color:#9a7a5a;border:1px solid #d4c5a9;padding:2px 7px;margin-top:2px;background:#faf7f0;}
.jp-copy:active{background:#e8dcc8;}

@media(max-width:400px){
  .btn-row{gap:3px;}
  .tag-btn{font-size:9px;padding:3px 5px;}
}
</style>
</head>

</nav>

<!-- ══════════════════════════════════════

<div id="page-checklist" class="page active">

</div>

<!-- top bar -->
<div class="topbar">

</div>

<!-- stats -->

<!-- view tabs -->
<div class="view-tabs">

</div>

<!-- list view -->
<div id="list-view">

    <span style="font-size:12px;color:#9a7a5a;">🔍</span>
    <input type="text" placeholder="검색 (데님, 플라넬, Carhartt...)" oninput="onSearch(this.value)" id="search-input"/>

  <div class="filter-bar" id="filter-bar"></div>
  <div id="cat-list"></div>

  <div style="margin-top:16px;margin-bottom:10px;">
    <button class="guide-header" onclick="toggleGuide()">

      <span id="guide-arrow" style="font-size:10px;opacity:.5;">▼</span>
    </button>
    <div id="guide-body" class="guide-body" style="display:none;"></div>
  </div>
</div>

<!-- summary view -->
<div id="summary-view" style="display:none;">
  <div class="budget-cards" id="budget-cards"></div>
  <div id="summary-list"></div>
</div>

<div class="footer" id="footer-text">◆ AMEKAJI WARDROBE ◆</div>
</div>
</div>

<!-- ══════════════════════════════════════
     PAGE: 일본어 회화
══════════════════════════════════════ -->
<div id="page-japanese" class="page">
<div class="inner">

<div class="jp-header">

  <div class="desc">도쿄 쇼핑 여행 필수 일본어</div>
</div>

<div class="jp-search">
  <span style="font-size:12px;color:#9a7a5a;">🔍</span>
  <input type="text" placeholder="검색 (예: 사이즈, 얼마, 감사...)" oninput="searchJP(this.value)" id="jp-search"/>
  <button onclick="clearJPSearch()" style="color:#b89f7a;font-size:14px;">✕</button>
</div>

<div class="jp-tabs">
  <button class="active" onclick="switchJPTab('common',this)">💬 자주 쓰는 일본어</button>
  <button onclick="switchJPTab('shopping',this)">🛍 쇼핑 관련</button>
</div>

<div id="jp-common"></div>
<div id="jp-shopping" style="display:none;"></div>

</div>
</div>

// IMAGE UPLOAD
// ════════════════════════════════
function handleImageUpload(itemId, file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    // resize to 200x200 max
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      const max=200; let w=img.width, h=img.height;
      if(w>max||h>max){ const r=Math.min(max/w,max/h); w*=r; h*=r; }
      canvas.width=w; canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      const data=canvas.toDataURL('image/jpeg',.82);
      localStorage.setItem('amekaji_img_'+itemId, data);
      updateItemImage(itemId, data);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removeImage(itemId){
  localStorage.removeItem('amekaji_img_'+itemId);
  updateItemImage(itemId, null);
}
function updateItemImage(itemId, data){
  const wrap=document.getElementById('img-'+itemId);
  if(!wrap) return;
  if(data){
    wrap.innerHTML=`<img src="${data}" alt=""/>
      <button class="img-remove" onclick="event.stopPropagation();removeImage('${itemId}')">✕</button>
      <input type="file" accept="image/*" onchange="handleImageUpload('${itemId}',this.files[0])" onclick="event.stopPropagation()"/>`;
  } else {
    wrap.innerHTML=`<div class="img-placeholder"><span>📷</span>사진 추가</div>
      <input type="file" accept="image/*" onchange="handleImageUpload('${itemId}',this.files[0])" onclick="event.stopPropagation()"/>`;
  }
}

  const item=ALL_ITEMS.find(i=>i.id===id);
  if(S.query && !item.name.toLowerCase().includes(S.query) && !item.en.toLowerCase().includes(S.query) && !item.model.toLowerCase().includes(S.query)) return false;
  if(S.filter==='all')  return true;
  if(S.filter==='none') return !S.statuses[id];
  if(S.filter==='pri1') return S.priorities[id]==='1';
  if(S.filter==='pri2') return S.priorities[id]==='2';
  return S.statuses[id]===S.filter;
}

// ════════════════════════════════
// STATS
// ════════════════════════════════
function updateStats(){
  const cnt={own:0,want:0,bought:0,skip:0};
  ALL_ITEMS.forEach(i=>{ if(S.statuses[i.id]) cnt[S.statuses[i.id]]++; });
  const none=ALL_ITEMS.length-cnt.own-cnt.want-cnt.bought-cnt.skip;
  const done=cnt.own+cnt.bought;
  const pct=Math.round(done/ALL_ITEMS.length*100);
  document.getElementById('stats-done').innerHTML=done+'<small>/'+ALL_ITEMS.length+'</small>';
  document.getElementById('stats-pct').textContent=pct+'%';
  const bar=document.getElementById('stats-bar');
  const segs=[{v:cnt.own,c:'#4a7c59'},{v:cnt.bought,c:'#c8622a'},{v:cnt.want,c:'#6b8fb5'},{v:cnt.skip,c:'#b05a4a'},{v:none,c:'rgba(255,255,255,.12)'}];
  bar.innerHTML=segs.filter(s=>s.v>0).map(s=>`<div style="flex:${s.v};background:${s.c};"></div>`).join('');
  document.getElementById('stats-legend').innerHTML=
    `<span style="color:#6db88a">■ 보유 ${cnt.own}</span>
     <span style="color:#e07a4a">■ 완료 ${cnt.bought}</span>
     <span style="color:#8fb5d4">■ 살예정 ${cnt.want}</span>
     <span style="color:#d4826e">■ 패스 ${cnt.skip}</span>
     <span>□ 미정 ${none}</span>`;
  document.getElementById('hdr-count').textContent=`🗾 도쿄 쇼핑 에디션 · 총 ${ALL_ITEMS.length}개 아이템`;
  document.getElementById('footer-text').textContent=
    pct>=100 ? '◆ WARDROBE COMPLETE ◆' :
    `◆ 살예정 ${cnt.want}개 · 구매완료 ${cnt.bought}개 · 미정 ${none}개 ◆`;
}

// ════════════════════════════════
// RENDER ITEM CARD
// ════════════════════════════════
function renderItemCard(item){
  const st=S.statuses[item.id];
  const pri=S.priorities[item.id];
  const sc=st?STATUS_CFG[st]:null;
  const pc=pri?PRI_CFG[pri]:null;
  const imgData=localStorage.getItem('amekaji_img_'+item.id);
  const hasMemo=!!(S.memos[item.id]&&S.memos[item.id].trim());
  const memoOpen=S.memoOpen[item.id];

  const imgHtml=imgData
    ?`<img src="${imgData}" alt=""/>
       <button class="img-remove" onclick="event.stopPropagation();removeImage('${item.id}')">✕</button>
       <input type="file" accept="image/*" onchange="handleImageUpload('${item.id}',this.files[0])" onclick="event.stopPropagation()"/>`
    :`<div class="img-placeholder"><span>📷</span>사진 추가</div>
      <input type="file" accept="image/*" onchange="handleImageUpload('${item.id}',this.files[0])" onclick="event.stopPropagation()"/>`;

  const dotHtml=sc?`<div class="status-dot" style="background:${sc.dot}"></div>`:'';
  const priHtml=pc?`<span class="pri-badge" style="color:${pc.color};background:${pc.bg};border-color:${pc.color}">${pc.label}</span>`:'';

  const statusBtns=Object.entries(STATUS_CFG).map(([k,v])=>{
    const a=st===k;
    return `<button class="tag-btn${a?' active':''}" style="${a?`color:${v.color};border-color:${v.color};background:${v.bg};font-weight:800;`:'color:#b89f7a;border-color:#d4c5a9;'}" onclick="toggleStatus('${item.id}','${k}')">${v.label}</button>`;
  }).join('');
  const priBtns=Object.entries(PRI_CFG).map(([k,v])=>{
    const a=pri===k;
    return `<button class="tag-btn${a?' active':''}" style="${a?`color:${v.color};background:${v.bg};border-color:${v.color};font-weight:800;`:'color:#b89f7a;border-color:#d4c5a9;'}" onclick="togglePriority('${item.id}','${k}')">${v.label}</button>`;
  }).join('');

  const budgetVal=S.budgets[item.id]||'';
  const budgetKrw=budgetVal?`<span class="budget-krw">≈ ${krw(budgetVal)}</span>`:'';

  const memoBtn=`<button class="memo-btn${hasMemo?' has':''}" onclick="toggleMemo('${item.id}')">${hasMemo?'✏ 메모 ▾':memoOpen?'메모 ▴':'메모 +'}</button>`;
  const memoArea=memoOpen?`<textarea class="memo-textarea" rows="2" placeholder="추가 메모..." oninput="updateField(S.memos,'${item.id}',this.value);scheduleSave();">${S.memos[item.id]||''}</textarea>`
    :(hasMemo?`<div class="memo-preview" onclick="toggleMemo('${item.id}')">${S.memos[item.id]}</div>`:'');

  return `
<div class="item-card" id="card-${item.id}" style="background:${sc?sc.bg:'transparent'}">
  <div class="item-inner">
    <div class="item-img" id="img-${item.id}">${imgHtml}</div>
    <div class="item-info">
      <div class="item-name-row">
        ${dotHtml}
        <span class="item-name${st==='skip'?' skip':''}">${item.name} <small style="color:#9a7a5a;font-size:10px;">(${item.en})</small></span>
        ${priHtml}
      </div>
      <div class="item-model">▸ ${item.model}</div>
      <div class="budget-row">
        <span class="yen">¥</span>
        <input type="number" placeholder="예산" value="${budgetVal}" oninput="S.budgets['${item.id}']=this.value?Number(this.value):null;scheduleSave();this.nextElementSibling.textContent=this.value?'≈ '+krw(Number(this.value)):'';" style="width:70px;border:none;border-bottom:1px solid #c5b49a;background:transparent;color:#3d2b1a;font-size:11px;outline:none;padding:1px 2px;"/>
        <span class="budget-krw">${budgetVal?'≈ '+krw(budgetVal):''}</span>
      </div>
      <div class="btn-row">
        ${statusBtns}
        <div class="btn-divider"></div>
        ${priBtns}
      </div>
      <div class="input-line">
        <span class="ico">📐</span>
        <input type="text" placeholder="사이즈 (M, W32L32, JP38)" value="${S.sizes[item.id]||''}" oninput="updateField(S.sizes,'${item.id}',this.value)"/>
      </div>
      <div class="input-line">
        <span class="ico">🎨</span>
        <input type="text" placeholder="색상 (인디고, 카키, 네이비)" value="${S.colors[item.id]||''}" oninput="updateField(S.colors,'${item.id}',this.value)"/>
      </div>
      <div class="input-line">
        <span class="ico">🏪</span>
        <input type="text" placeholder="구매처 / 매장" value="${S.stores[item.id]||''}" oninput="updateField(S.stores,'${item.id}',this.value)"/>
      </div>
      ${memoBtn}
      ${memoArea}
    </div>
  </div>
</div>`;
}

function toggleMemo(id){
  S.memoOpen[id]=!S.memoOpen[id];
  const card=document.getElementById('card-'+id);
  if(card) card.outerHTML=renderItemCard(ALL_ITEMS.find(i=>i.id===id));
}

// ════════════════════════════════
// RENDER CATEGORIES
// ════════════════════════════════
function renderCatList(){
  const el=document.getElementById('cat-list');
  let html='';
  CATEGORIES.forEach(cat=>{
    const vis=cat.items.filter(i=>shouldShow(i.id));
    if(!vis.length) return;
    const done=cat.items.filter(i=>S.statuses[i.id]==='own'||S.statuses[i.id]==='bought').length;
    const isOpen=S.openCats[cat.id];
    const badgeStyle=done===cat.items.length?'background:#c8a96e;color:#3d2b1a':'background:rgba(255,255,255,.1);color:#c8a96e';
    html+=`<div style="margin-bottom:10px;">
      <button class="cat-header" onclick="toggleCat('${cat.id}')">
        <div class="left"><span class="icon">${cat.icon}</span><span class="name">${cat.label}</span></div>
        <div class="right">
          <span class="cat-badge" style="${badgeStyle}">${done}/${cat.items.length}</span>
          <span class="cat-arrow">${isOpen?'▲':'▼'}</span>
        </div>
      </button>
      ${isOpen?`<div class="cat-body">${vis.map(item=>renderItemCard(item)).join('')}</div>`:''}
    </div>`;
  });
  el.innerHTML=html;
}
function toggleCat(id){
  S.openCats[id]=!S.openCats[id];
  saveJSON('amekaji_opencats',S.openCats);
  renderCatList();
}

// ════════════════════════════════
// FILTER BAR
// ════════════════════════════════
function renderFilterBar(){
  const filters=[
    {k:'all',l:'전체'},{k:'want',l:'♥ 살예정'},{k:'bought',l:'🛍 완료'},
    {k:'pri1',l:'★ 1순위'},{k:'pri2',l:'☆ 2순위'},
    {k:'own',l:'✓ 보유'},{k:'skip',l:'✕ 패스'},{k:'none',l:'□ 미정'},
  ];
  document.getElementById('filter-bar').innerHTML=filters.map(f=>
    `<button class="${S.filter===f.k?'active':''}" onclick="setFilter('${f.k}');document.querySelectorAll('.filter-bar button').forEach(b=>b.classList.remove('active'));this.classList.add('active')">${f.l}</button>`
  ).join('');
}

// ════════════════════════════════
// SUMMARY VIEW
// ════════════════════════════════
function renderSummary(){
  const items=ALL_ITEMS.filter(i=>S.statuses[i.id]==='want'||S.statuses[i.id]==='bought'||S.priorities[i.id]);
  const wantBudget=ALL_ITEMS.filter(i=>S.statuses[i.id]==='want').reduce((s,i)=>s+(Number(S.budgets[i.id])||0),0);
  const boughtBudget=ALL_ITEMS.filter(i=>S.statuses[i.id]==='bought').reduce((s,i)=>s+(Number(S.budgets[i.id])||0),0);
  const pri1Budget=ALL_ITEMS.filter(i=>S.priorities[i.id]==='1').reduce((s,i)=>s+(Number(S.budgets[i.id])||0),0);

  const cards=[
    {label:'살예정 예산',val:wantBudget,color:'#6b8fb5'},
    {label:'★ 1순위 예산',val:pri1Budget,color:'#c8622a'},
    {label:'구매완료 합계',val:boughtBudget,color:'#4a7c59'},
  ].filter(c=>c.val>0);

  document.getElementById('budget-cards').innerHTML=cards.map(c=>`
    <div class="budget-card" style="border:1.5px solid ${c.color}40">
      <div class="bc-label">${c.label}</div>
      <div class="bc-yen" style="color:${c.color}">${yen(c.val)}</div>
      <div class="bc-krw">≈ ${krw(c.val)}</div>
    </div>`).join('');

  if(!items.length){
    document.getElementById('summary-list').innerHTML='<div style="text-align:center;padding:40px;color:#9a7a5a;font-size:12px;">♥ 살예정 또는 ★순위 아이템이 없습니다</div>';
    return;
  }
  const grouped={};
  items.forEach(i=>{ const c=ITEM_CAT[i.id]; if(!grouped[c.id]) grouped[c.id]={...c,items:[]}; grouped[c.id].items.push(i); });
  let html='';
  Object.values(grouped).forEach(cat=>{
    html+=`<div style="margin-bottom:12px;">
      <div style="display:flex;align-items:center;gap:8px;padding:7px 13px;background:#3d2b1a;color:#f5f0e8;">
        <span>${cat.icon}</span><span style="font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;">${cat.label}</span>
      </div>
      <div style="border:1px solid #3d2b1a;border-top:none;">`;
    cat.items.forEach((item,idx)=>{
      const st=S.statuses[item.id]; const pri=S.priorities[item.id];
      const sc=st?STATUS_CFG[st]:null; const pc=pri?PRI_CFG[pri]:null;
      const bgt=S.budgets[item.id];
      const imgData=localStorage.getItem('amekaji_img_'+item.id);
      html+=`<div style="display:flex;gap:10px;padding:10px 13px;background:${sc?sc.bg:'transparent'};${idx>0?'border-top:1px dashed #d4c5a9':''};align-items:flex-start;">
        ${imgData?`<img src="${imgData}" style="width:56px;height:56px;object-fit:cover;border:1px solid #d4c5a9;flex-shrink:0;" alt=""/>`
                 :`<div style="width:56px;height:56px;background:#f0ebe0;border:1px solid #d4c5a9;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:#b89f7a;">사진없음</div>`}
        <div style="flex:1;">
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:3px;">
            ${sc?`<span style="font-size:9px;color:${sc.color};border:1px solid ${sc.color};padding:1px 5px;font-weight:700;">${sc.label}</span>`:''}
            ${pc?`<span style="font-size:9px;color:${pc.color};background:${pc.bg};border:1px solid ${pc.color};padding:1px 5px;font-weight:800;">${pc.label}</span>`:''}
          </div>
          <div style="font-size:12px;font-weight:700;color:#3d2b1a;margin-bottom:2px;">${item.name}</div>
          <div style="font-size:10px;color:#9a7a5a;margin-bottom:2px;">▸ ${item.model}</div>
          ${S.sizes[item.id]?`<div style="font-size:10px;color:#7a5c3a;">📐 ${S.sizes[item.id]}</div>`:''}
          ${S.colors[item.id]?`<div style="font-size:10px;color:#7a5c3a;">🎨 ${S.colors[item.id]}</div>`:''}
          ${S.stores[item.id]?`<div style="font-size:10px;color:#7a5c3a;">🏪 ${S.stores[item.id]}</div>`:''}
          ${S.memos[item.id]?`<div style="font-size:10px;color:#6a4c2e;border-left:2px solid #c8a96e;padding-left:6px;margin-top:4px;">${S.memos[item.id]}</div>`:''}
        </div>
        ${bgt?`<div style="text-align:right;flex-shrink:0;"><div style="font-size:14px;font-weight:900;color:${st==='bought'?'#c8622a':'#6b8fb5'}">${yen(bgt)}</div><div style="font-size:10px;color:#9a7a5a;">${krw(bgt)}</div></div>`:''}
      </div>`;
    });
    html+='</div></div>';
  });
  document.getElementById('summary-list').innerHTML=html;
}

// ════════════════════════════════
// JAPANESE PAGE
// ════════════════════════════════
function switchJPTab(tab, btn){
  S.jpTab=tab;
  document.querySelectorAll('.jp-tabs button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('jp-common').style.display=tab==='common'?'block':'none';
  document.getElementById('jp-shopping').style.display=tab==='shopping'?'block':'none';
}
function searchJP(v){
  S.jpQuery=v.toLowerCase();
  renderJPPhrases();
}
function clearJPSearch(){
  document.getElementById('jp-search').value='';
  S.jpQuery='';
  renderJPPhrases();
}
function copyText(text){
  navigator.clipboard?.writeText(text).catch(()=>{});
  // fallback
  const el=document.createElement('textarea');
  el.value=text; document.body.appendChild(el); el.select();
  document.execCommand('copy'); document.body.removeChild(el);
}
function renderJPCard(p){
  return `<div class="jp-card">
    <button class="jp-copy" onclick="copyText('${p.jp.replace(/'/g,"\\'")}')">📋 복사</button>
    <div class="jp-japanese">${p.jp}</div>
    <div class="jp-reading">🔊 ${p.read}</div>
    <div class="jp-meaning">💬 ${p.meaning}</div>
    ${p.tip?`<div class="jp-tip">💡 ${p.tip}</div>`:''}
  </div>`;
}
function filterPhrases(list){
  if(!S.jpQuery) return list;
  return list.filter(p=>
    p.jp.includes(S.jpQuery)||
    p.read.toLowerCase().includes(S.jpQuery)||
    p.meaning.toLowerCase().includes(S.jpQuery)||
    (p.tip&&p.tip.toLowerCase().includes(S.jpQuery))
  );
}
function renderJPPhrases(){
  const common=filterPhrases(JP_COMMON);
  const shopping=filterPhrases(JP_SHOPPING);

  document.getElementById('jp-common').innerHTML=
    common.length
    ?`<div class="jp-section-title">💬 자주 쓰는 일본어 (${common.length}개)</div><div class="jp-cards">${common.map(renderJPCard).join('')}</div>`
    :'<div style="text-align:center;padding:30px;color:#9a7a5a;font-size:12px;">검색 결과가 없습니다</div>';

  document.getElementById('jp-shopping').innerHTML=
    shopping.length
    ?`<div class="jp-section-title">🛍 쇼핑 관련 일본어 (${shopping.length}개)</div><div class="jp-cards">${shopping.map(renderJPCard).join('')}</div>`
    :'<div style="text-align:center;padding:30px;color:#9a7a5a;font-size:12px;">검색 결과가 없습니다</div>';
}

// ════════════════════════════════
// FULL RENDER
// ════════════════════════════════
function renderAll(){
  updateStats();
  renderFilterBar();
  renderCatList();
  if(S.view==='summary') renderSummary();
}

// INIT

document.addEventListener('DOMContentLoaded',()=>{
  // restore rate
  document.getElementById('rate-input').value=S.rate;
  // restore last saved
  const saved=localStorage.getItem('amekaji_savedAt');
  if(saved) document.getElementById('save-time').innerHTML='🕐 <strong>'+saved+'</strong>';
  // render
  renderGuide();
  renderAll();
  renderJPPhrases();
});
</script>
